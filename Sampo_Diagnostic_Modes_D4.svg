<svg viewBox="0 0 680 1020" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;600;700&amp;family=Instrument+Serif:ital@0;1&amp;display=swap');
      .title { font-family: 'Instrument Sans', 'Helvetica Neue', Arial, sans-serif; font-weight: 700; font-size: 22px; fill: #2C2C2A; }
      .subtitle { font-family: 'Instrument Sans', 'Helvetica Neue', Arial, sans-serif; font-weight: 400; font-size: 13px; fill: #64625C; }
      .subtitle-italic { font-family: 'Instrument Serif', Georgia, serif; font-style: italic; font-weight: 400; font-size: 14px; fill: #2C2C2A; }
      .version-label { font-family: 'Instrument Sans', 'Helvetica Neue', Arial, sans-serif; font-weight: 700; font-size: 11px; letter-spacing: 0.5px; }
      .version-title { font-family: 'Instrument Sans', 'Helvetica Neue', Arial, sans-serif; font-weight: 700; font-size: 16px; fill: #2C2C2A; }
      .version-desc { font-family: 'Instrument Sans', 'Helvetica Neue', Arial, sans-serif; font-weight: 400; font-size: 11px; fill: #8C8A82; }
      .box-label { font-family: 'Instrument Sans', 'Helvetica Neue', Arial, sans-serif; font-weight: 600; font-size: 12px; }
      .box-sub { font-family: 'Instrument Sans', 'Helvetica Neue', Arial, sans-serif; font-weight: 400; font-size: 10px; }
      .callout-title { font-family: 'Instrument Sans', 'Helvetica Neue', Arial, sans-serif; font-weight: 700; font-size: 11px; }
      .callout-body { font-family: 'Instrument Sans', 'Helvetica Neue', Arial, sans-serif; font-weight: 400; font-size: 10.5px; fill: #64625C; }
      .badge { font-family: 'Instrument Sans', 'Helvetica Neue', Arial, sans-serif; font-weight: 700; font-size: 10px; letter-spacing: 0.3px; }
      .distinction-title { font-family: 'Instrument Sans', 'Helvetica Neue', Arial, sans-serif; font-weight: 700; font-size: 14px; fill: #2C2C2A; }
      .distinction-body { font-family: 'Instrument Sans', 'Helvetica Neue', Arial, sans-serif; font-weight: 400; font-size: 11.5px; fill: #64625C; }
      .distinction-italic { font-family: 'Instrument Serif', Georgia, serif; font-style: italic; font-weight: 400; font-size: 12px; fill: #2C2C2A; }
      .table-header { font-family: 'Instrument Sans', 'Helvetica Neue', Arial, sans-serif; font-weight: 700; font-size: 14px; fill: #2C2C2A; }
      .th { font-family: 'Instrument Sans', 'Helvetica Neue', Arial, sans-serif; font-weight: 600; font-size: 10px; fill: #2C2C2A; }
      .td { font-family: 'Instrument Sans', 'Helvetica Neue', Arial, sans-serif; font-weight: 400; font-size: 10px; fill: #64625C; }
      .td-bold { font-family: 'Instrument Sans', 'Helvetica Neue', Arial, sans-serif; font-weight: 600; font-size: 10px; }
      .footnote { font-family: 'Instrument Serif', Georgia, serif; font-style: italic; font-weight: 400; font-size: 9px; fill: #8C8A82; }
      .closing { font-family: 'Instrument Serif', Georgia, serif; font-style: italic; font-weight: 400; font-size: 13px; fill: #2C2C2A; }
      .closing-sub { font-family: 'Instrument Sans', 'Helvetica Neue', Arial, sans-serif; font-weight: 400; font-size: 10.5px; fill: #8C8A82; }
      .closing-small { font-family: 'Instrument Sans', 'Helvetica Neue', Arial, sans-serif; font-weight: 400; font-size: 9px; fill: #B4B2AC; }
      .closing-disclaimer { font-family: 'Instrument Serif', Georgia, serif; font-style: italic; font-weight: 400; font-size: 8.5px; fill: #B4B2AC; }
      .stick-figure { stroke: #2C2C2A; stroke-width: 1.5; fill: none; stroke-linecap: round; }
      .stick-head { stroke: #2C2C2A; stroke-width: 1.5; fill: none; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="680" height="1020" fill="#F5F0E8" rx="0"/>

  <!-- Title block -->
  <text x="340" y="40" text-anchor="middle" class="title">Sampo Diagnostic Kit</text>
  <text x="340" y="58" text-anchor="middle" class="subtitle">User → System: Correction Behavior</text>
  <text x="340" y="76" text-anchor="middle" class="subtitle-italic">Three Audit Modes</text>

  <!-- ===== OPTION A ===== -->
  <text x="40" y="112" class="version-label" fill="#7B8FA1">OPTION A</text>
  <text x="40" y="130" class="version-title">Live Search</text>
  <text x="40" y="144" class="version-desc">System audits its own conversation history</text>

  <!-- Stick figure A -->
  <circle cx="72" cy="168" r="7" class="stick-head"/>
  <line x1="72" y1="175" x2="72" y2="195" class="stick-figure"/>
  <line x1="72" y1="195" x2="62" y2="210" class="stick-figure"/>
  <line x1="72" y1="195" x2="82" y2="210" class="stick-figure"/>
  <line x1="72" y1="182" x2="58" y2="190" class="stick-figure"/>
  <line x1="72" y1="182" x2="86" y2="190" class="stick-figure"/>

  <!-- Arrow from figure to System A box -->
  <line x1="100" y1="186" x2="172" y2="186" stroke="#2C2C2A" stroke-width="0.8"/>
  <polygon points="172,186 167,188 167,184" fill="#2C2C2A"/>

  <!-- System A box -->
  <rect x="182" y="167" width="150" height="42" rx="6" fill="rgb(123,143,161)" fill-opacity="0.12" stroke="#7B8FA1" stroke-width="0.5"/>
  <text x="257" y="185" text-anchor="middle" class="box-label" fill="#2C2C2A">System A</text>
  <text x="257" y="199" text-anchor="middle" class="box-sub" fill="#8C8A82">history + auditor</text>

  <!-- Loop arrow -->
  <path d="M 332 175 C 358 170, 358 205, 332 200" fill="none" stroke="#7B8FA1" stroke-width="0.8"/>
  <polygon points="332,200 336,197 335,203" fill="#7B8FA1"/>

  <!-- Warning triangle -->
  <polygon points="400,165 396,172 404,172" fill="none" stroke="#FF7A05" stroke-width="1.2"/>
  <line x1="400" y1="167.5" x2="400" y2="170" stroke="#FF7A05" stroke-width="1"/>
  <circle cx="400" cy="171" r="0.8" fill="#FF7A05"/>

  <!-- Callout -->
  <text x="412" y="172" class="callout-title" fill="#EB9A2F">Conflict of interest</text>
  <text x="400" y="186" class="callout-body">System evaluates a relationship</text>
  <text x="400" y="198" class="callout-body">it participated in producing</text>

  <!-- Indicative badge -->
  <rect x="400" y="206" width="72" height="18" rx="3" fill="none" stroke="#7B8FA1" stroke-width="1"/>
  <text x="436" y="218" text-anchor="middle" class="badge" fill="#7B8FA1">Indicative</text>

  <!-- ===== OPTION B ===== -->
  <text x="40" y="258" class="version-label" fill="#65A30D">OPTION B</text>
  <text x="40" y="276" class="version-title">Corpus</text>
  <text x="40" y="290" class="version-desc">User pastes transcript into any system</text>

  <!-- Stick figure B -->
  <circle cx="72" cy="312" r="7" class="stick-head"/>
  <line x1="72" y1="319" x2="72" y2="339" class="stick-figure"/>
  <line x1="72" y1="339" x2="62" y2="354" class="stick-figure"/>
  <line x1="72" y1="339" x2="82" y2="354" class="stick-figure"/>
  <line x1="72" y1="326" x2="58" y2="334" class="stick-figure"/>
  <line x1="72" y1="326" x2="86" y2="334" class="stick-figure"/>

  <!-- Arrow to doc -->
  <line x1="100" y1="330" x2="153" y2="330" stroke="#2C2C2A" stroke-width="0.8"/>
  <polygon points="153,330 148,332 148,328" fill="#2C2C2A"/>

  <!-- Document icon -->
  <rect x="164" y="316" width="28" height="32" rx="2" fill="none" stroke="#2C2C2A" stroke-width="1"/>
  <line x1="170" y1="325" x2="186" y2="325" stroke="#2C2C2A" stroke-width="0.7"/>
  <line x1="170" y1="331" x2="186" y2="331" stroke="#2C2C2A" stroke-width="0.7"/>
  <line x1="170" y1="337" x2="182" y2="337" stroke="#2C2C2A" stroke-width="0.7"/>

  <!-- Arrow to system -->
  <line x1="198" y1="330" x2="252" y2="330" stroke="#2C2C2A" stroke-width="0.8"/>
  <polygon points="252,330 247,332 247,328" fill="#2C2C2A"/>

  <!-- Any System box -->
  <rect x="262" y="312" width="130" height="42" rx="6" fill="rgb(101,163,13)" fill-opacity="0.12" stroke="#65A30D" stroke-width="0.5"/>
  <text x="327" y="330" text-anchor="middle" class="box-label" fill="#3D6B00">Any System</text>
  <text x="327" y="344" text-anchor="middle" class="box-sub" fill="#65A30D">auditor only</text>

  <!-- Callout -->
  <text x="425" y="317" class="callout-title" fill="#2C2C2A">Complete data</text>
  <text x="425" y="330" class="callout-body">No search dependency</text>
  <text x="425" y="342" class="callout-body">Portable across all systems</text>

  <!-- Reliable badge -->
  <rect x="425" y="350" width="62" height="18" rx="3" fill="none" stroke="#65A30D" stroke-width="1"/>
  <text x="456" y="362" text-anchor="middle" class="badge" fill="#65A30D">Reliable</text>

  <!-- ===== OPTION C ===== -->
  <text x="40" y="402" class="version-label" fill="#FF7A05">OPTION C</text>
  <text x="40" y="420" class="version-title">Cross-System Audit</text>
  <text x="40" y="434" class="version-desc">Export from System A → analyze on System B</text>

  <!-- Stick figure C -->
  <circle cx="60" cy="458" r="7" class="stick-head"/>
  <line x1="60" y1="465" x2="60" y2="485" class="stick-figure"/>
  <line x1="60" y1="485" x2="50" y2="500" class="stick-figure"/>
  <line x1="60" y1="485" x2="70" y2="500" class="stick-figure"/>
  <line x1="60" y1="472" x2="46" y2="480" class="stick-figure"/>
  <line x1="60" y1="472" x2="74" y2="480" class="stick-figure"/>

  <!-- System A box -->
  <rect x="100" y="454" width="120" height="42" rx="6" fill="rgb(123,143,161)" fill-opacity="0.12" stroke="#B4B2AC" stroke-width="0.5"/>
  <text x="160" y="472" text-anchor="middle" class="box-label" fill="#2C2C2A">System A</text>
  <text x="160" y="486" text-anchor="middle" class="box-sub" fill="#8C8A82">source</text>

  <!-- Arrow from A to doc -->
  <line x1="220" y1="475" x2="253" y2="475" stroke="#2C2C2A" stroke-width="0.8"/>
  <polygon points="253,475 248,477 248,473" fill="#2C2C2A"/>

  <!-- Document icon -->
  <rect x="264" y="461" width="28" height="32" rx="2" fill="none" stroke="#2C2C2A" stroke-width="1"/>
  <line x1="270" y1="470" x2="286" y2="470" stroke="#2C2C2A" stroke-width="0.7"/>
  <line x1="270" y1="476" x2="286" y2="476" stroke="#2C2C2A" stroke-width="0.7"/>
  <line x1="270" y1="482" x2="282" y2="482" stroke="#2C2C2A" stroke-width="0.7"/>

  <text x="278" y="506" text-anchor="middle" class="box-sub" fill="#8C8A82" font-style="italic">export</text>

  <!-- Arrow from doc to B -->
  <line x1="298" y1="475" x2="337" y2="475" stroke="#2C2C2A" stroke-width="0.8"/>
  <polygon points="337,475 332,477 332,473" fill="#2C2C2A"/>

  <!-- System B box -->
  <rect x="347" y="454" width="150" height="42" rx="6" fill="rgb(255,122,5)" fill-opacity="0.10" stroke="#FF7A05" stroke-width="0.5"/>
  <text x="422" y="472" text-anchor="middle" class="box-label" fill="#CC5F00">System B</text>
  <text x="422" y="486" text-anchor="middle" class="box-sub" fill="#FF7A05">independent auditor</text>

  <!-- Callout -->
  <text x="525" y="459" class="callout-title" fill="#FF7A05">Gold standard</text>
  <text x="525" y="472" class="callout-body">No stake in the relationship</text>
  <text x="525" y="484" class="callout-body">No trained model of the user</text>

  <!-- Definitive badge -->
  <rect x="525" y="492" width="72" height="18" rx="3" fill="none" stroke="#FF7A05" stroke-width="1"/>
  <text x="561" y="504" text-anchor="middle" class="badge" fill="#FF7A05">Definitive</text>

  <!-- ===== CORE DISTINCTION ===== -->
  <rect x="60" y="532" width="560" height="72" rx="8" fill="none" stroke="#B4B2AC" stroke-width="0.5" stroke-dasharray="4 3"/>
  <text x="340" y="553" text-anchor="middle" class="distinction-title">The Core Distinction</text>
  <text x="340" y="571" text-anchor="middle" class="distinction-body">Options A and B measure what the user and the system</text>
  <text x="340" y="585" text-anchor="middle" class="distinction-body">have jointly agreed the relationship looks like.</text>
  <text x="340" y="599" text-anchor="middle" class="distinction-italic">Option C measures what it actually looks like to someone who wasn't in the room.</text>

  <!-- ===== VALIDATION RESULTS ===== -->
  <text x="340" y="638" text-anchor="middle" class="table-header">Validation Results</text>

  <!-- Table header row -->
  <text x="50" y="662" class="th">System</text>
  <text x="130" y="662" class="th">Mode</text>
  <text x="175" y="662" class="th">Input</text>
  <text x="400" y="662" class="th">Ratio</text>
  <text x="460" y="662" class="th">Assessment</text>

  <line x1="40" y1="667" x2="640" y2="667" stroke="#B4B2AC" stroke-width="0.5"/>

  <!-- Mode A rows -->
  <text x="50" y="682" class="td">Claude</text>
  <text x="130" y="682" class="td-bold" fill="#7B8FA1">A</text>
  <text x="175" y="682" class="td">Live search (project)</text>
  <text x="400" y="682" class="td">100%</text>
  <text x="460" y="682" class="td" fill="#7B8FA1">Healthy correction</text>

  <text x="50" y="698" class="td">ChatGPT</text>
  <text x="130" y="698" class="td-bold" fill="#7B8FA1">A</text>
  <text x="175" y="698" class="td">Live search (full history)</text>
  <text x="400" y="698" class="td">100%</text>
  <text x="460" y="698" class="td" fill="#7B8FA1">Healthy correction</text>

  <!-- Subtle separator -->
  <line x1="50" y1="705" x2="630" y2="705" stroke="#B4B2AC" stroke-width="0.3" stroke-dasharray="2 3"/>

  <!-- Mode B rows -->
  <text x="50" y="720" class="td">ChatGPT</text>
  <text x="130" y="720" class="td-bold" fill="#65A30D">B</text>
  <text x="175" y="720" class="td">Product launch (v1.0)</text>
  <text x="400" y="720" class="td">20%</text>
  <text x="460" y="720" class="td" fill="#FF7A05">Degrading correction</text>

  <text x="50" y="736" class="td">Claude</text>
  <text x="130" y="736" class="td-bold" fill="#65A30D">B</text>
  <text x="175" y="736" class="td">Product launch (v1.0)</text>
  <text x="400" y="736" class="td">75%</text>
  <text x="460" y="736" class="td" fill="#FF7A05">Degrading → collapse</text>

  <text x="50" y="752" class="td">Claude</text>
  <text x="130" y="752" class="td-bold" fill="#65A30D">B</text>
  <text x="175" y="752" class="td">Nonprofit report (v1.1)</text>
  <text x="400" y="752" class="td">53.8%</text>
  <text x="460" y="752" class="td" fill="#FF7A05">Degrading correction</text>

  <text x="50" y="768" class="td">ChatGPT</text>
  <text x="130" y="768" class="td-bold" fill="#65A30D">B</text>
  <text x="175" y="768" class="td">Nonprofit report (v1.1)</text>
  <text x="400" y="768" class="td">42.9%</text>
  <text x="460" y="768" class="td" fill="#FF7A05">Corrective collapse</text>

  <!-- Subtle separator -->
  <line x1="50" y1="775" x2="630" y2="775" stroke="#B4B2AC" stroke-width="0.3" stroke-dasharray="2 3"/>

  <!-- Mode C rows -->
  <text x="50" y="790" class="td">Gemini</text>
  <text x="130" y="790" class="td-bold" fill="#FF7A05">C</text>
  <text x="175" y="790" class="td">Real transcript (42 convs)</text>
  <text x="400" y="790" class="td">100%</text>
  <text x="460" y="790" class="td" fill="#7B8FA1">Healthy correction</text>

  <text x="50" y="806" class="td">DeepSeek</text>
  <text x="130" y="806" class="td-bold" fill="#FF7A05">C</text>
  <text x="175" y="806" class="td">Real transcript (42 convs)</text>
  <text x="400" y="806" class="td">100%</text>
  <text x="460" y="806" class="td" fill="#7B8FA1">Healthy correction</text>

  <text x="50" y="822" class="td">Grok</text>
  <text x="130" y="822" class="td-bold" fill="#FF7A05">C</text>
  <text x="175" y="822" class="td">Real transcript (42 convs)</text>
  <text x="400" y="822" class="td">100%</text>
  <text x="460" y="822" class="td" fill="#7B8FA1">Healthy correction</text>

  <line x1="40" y1="830" x2="640" y2="830" stroke="#B4B2AC" stroke-width="0.5"/>

  <!-- Footnote -->
  <text x="50" y="846" class="footnote">* Calibration transcripts with known embedded correction behavior signals,</text>
  <text x="50" y="858" class="footnote">used to verify detection accuracy before trusting with real data.</text>

  <!-- ===== FOOTER ===== -->
  <line x1="80" y1="880" x2="600" y2="880" stroke="#B4B2AC" stroke-width="0.5" opacity="0.5"/>

  <text x="340" y="900" text-anchor="middle" class="closing">The discipline cannot be bought or sold. It can be measured.</text>
  <text x="340" y="916" text-anchor="middle" class="closing-sub">Sampo Diagnostic Kit · User → System · Correction Behavior v1.1</text>

  <text x="340" y="934" text-anchor="middle" class="closing-small">© 2026 Christopher Horrocks · chorrocks.substack.com</text>
