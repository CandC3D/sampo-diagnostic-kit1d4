  <text x="340" y="962" text-anchor="middle" class="closing-disclaimer">The views expressed in this work are the author's own</text>
  <text x="340" y="972" text-anchor="middle" class="closing-disclaimer">and do not represent any official or unofficial position of the University of Pennsylvania.</text>
</svg>